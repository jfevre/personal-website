name: Security Audit

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        id: audit
        run: |
          npm audit --audit-level=moderate > audit-report.txt 2>&1 || true
          if grep -q "found 0 vulnerabilities" audit-report.txt; then
            echo "has_vulnerabilities=false" >> $GITHUB_OUTPUT
          else
            echo "has_vulnerabilities=true" >> $GITHUB_OUTPUT
            cat audit-report.txt
          fi

      - name: Attempt auto-fix
        if: steps.audit.outputs.has_vulnerabilities == 'true'
        id: fix
        run: |
          npm audit fix || true
          if git diff --quiet package-lock.json; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR with fixes
        if: steps.fix.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="security/npm-audit-fix-$(date +%Y%m%d)"
          git checkout -b $BRANCH
          git add package-lock.json package.json
          git commit -m "fix: apply npm audit security fixes"
          git push origin $BRANCH

          gh pr create \
            --title "Security: npm audit fixes" \
            --body "Automated security fixes from \`npm audit fix\`.\n\nReview changes before merging." \
            --base main \
            --head $BRANCH
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build verification
        if: steps.fix.outputs.has_changes == 'true'
        run: |
          npm ci
          npm run build
